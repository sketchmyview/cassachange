# cassachange.yml
# Cassandra schema migration tool — full configuration reference

profiles:
  dev:
    hosts:
      - host.docker.internal
    port: 9042
    username: cassandra
    password: cassandra

    # secrets_provider: azure-keyvault
    # secrets:
    #   astra_token:           akv://data-harbour-dbr-kv/astra-org-token
    #   secure_connect_bundle: akv://data-harbour-dbr-kv/astra-scb-zip-cs-b64
    keyspaces:
      - my_keyspace
      - ks_demo_1
    history_keyspace: ks_migrations

  staging:
    hosts: [cassandra-staging.internal]
    keyspace: myapp_staging
    history_keyspace: myapp_migrations_staging
    timeout: 60
    notifications:
      on_events: [deploy_failed, rollback_failed, script_failed]
      channels:
        - type: slack
          webhook_url_env: SLACK_WEBHOOK_URL_STAGING

  prod:
    hosts:
      - cass1.prod.internal
      - cass2.prod.internal
      - cass3.prod.internal
    keyspace: myapp_prod
    history_keyspace: myapp_migrations_prod
    timeout: 120
    notifications:
      on_events:
        - deploy_success
        - deploy_failed
        - rollback_success
        - rollback_failed
        - script_failed
      channels:
        - type: slack
          webhook_url_env: SLACK_WEBHOOK_URL_PROD
        - type: webhook
          url: https://ops.example.com/hooks/cassachange
          headers:
            Authorization: "Bearer ${OPS_WEBHOOK_TOKEN}"
          timeout: 10

# ---------------------------------------------------------------------------
