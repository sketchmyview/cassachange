name: Cassandra Migrations
on:
  push:
    branches: [main]
    paths: ['migrations/**']
  workflow_dispatch:
    inputs:
      profile:
        description: 'Config profile (dev / staging / prod)'
        required: true
        default: staging
      tag:
        description: 'Release tag (e.g. release-2.1.0)'
        required: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install cassachange
      - run: cassachange validate

  dry-run:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install cassachange
      - name: Generate migration plan
        run: |
          cassachange deploy \
            --profile ${{ github.event.inputs.profile || 'staging' }} \
            --dry-run \
            --dry-run-output migration-plan.json
        env:
          CASSACHANGE_HISTORY_KEYSPACE: ${{ secrets.HISTORY_KEYSPACE }}
          AZURE_CLIENT_ID:              ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:          ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID:              ${{ secrets.AZURE_TENANT_ID }}
      - uses: actions/upload-artifact@v4
        with:
          name: migration-plan
          path: migration-plan.json

  deploy:
    runs-on: ubuntu-latest
    needs: dry-run
    environment: ${{ github.event.inputs.profile || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install cassachange
      - name: Run migrations
        run: |
          cassachange deploy \
            --profile ${{ github.event.inputs.profile || 'staging' }} \
            --tag "${{ github.event.inputs.tag || github.sha }}"
        env:
          CASSACHANGE_HISTORY_KEYSPACE: ${{ secrets.HISTORY_KEYSPACE }}
          AZURE_CLIENT_ID:              ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:          ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID:              ${{ secrets.AZURE_TENANT_ID }}
          SLACK_WEBHOOK_URL_STAGING:    ${{ secrets.SLACK_WEBHOOK_URL }}

  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    environment: ${{ github.event.inputs.profile || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install cassachange
      - name: Roll back
        run: |
          cassachange rollback \
            --profile ${{ github.event.inputs.profile || 'staging' }} \
            --tag "${{ github.event.inputs.tag || github.sha }}"
        env:
          CASSACHANGE_HISTORY_KEYSPACE: ${{ secrets.HISTORY_KEYSPACE }}
          AZURE_CLIENT_ID:              ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:          ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID:              ${{ secrets.AZURE_TENANT_ID }}
